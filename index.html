<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOSK | Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* Fonu tam ağ edirik ki loqo ilə birləşsin */
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            color: #1d1d1f;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .main-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin: 0 auto;
            /* Loqonu mərkəzə qoyuruq */
            display: block;
        }
        .action-btn {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #1d1d1f;
            border: 1px solid transparent;
        }
        .action-btn:hover {
            background: #e8e8ed;
            transform: scale(1.02);
        }
        .btn-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            background: #0071e3; /* Apple Blue */
            color: white;
        }
        .btn-full:hover {
            background: #0077ed;
        }
        .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        
        <div class="logo-container">
            <img src="logo.png" alt="ZEOSK Ecosystem" class="logo-img">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="tel:+994709060986" class="action-btn">
                <i class="fa-solid fa-phone text-blue-500 text-xl"></i>
                <span class="label">Zəng et</span>
            </a>

            <a href="https://wa.me/994709060986" class="action-btn">
                <i class="fa-brands fa-whatsapp text-green-500 text-xl"></i>
                <span class="label">WhatsApp</span>
            </a>

            <a href="https://instagram.com/_zeosk_" class="action-btn">
                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                <span class="label">Instagram</span>
            </a>

            <a href="mailto:zeosksoftwareecosystem@gmail.com" class="action-btn btn-full">
                <i class="fa-solid fa-envelope text-xl"></i>
                <span class="label">Email Göndər</span>
            </a>
        </div>

        <div class="mt-16 opacity-30">
            <p style="font-size: 9px; letter-spacing: 3px; font-weight: bold;">ZEOSK SOFTWARE ECOSYSTEM</p>
        </div>
    </div>

</body>
</html>
