<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOSK Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            width: 90%;
            max-width: 380px;
            padding: 50px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* Yeni Yazılı Loqo Stili */
        .brand-area {
            margin-bottom: 40px;
        }
        .brand-name {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #0f172a;
            line-height: 1;
            margin-bottom: 8px;
        }
        .brand-sub {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #64748b;
            text-transform: uppercase;
        }

        .action-btn {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #3b82f6;
        }
        .btn-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
        }
        .btn-primary {
            background: #0071e3;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #0062c4;
        }

        .footer-text {
            margin-top: 50px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #94a3b8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="glass-card animate__animated animate__fadeInUp">
        
        <div class="brand-area">
            <h1 class="brand-name">ZEOSK</h1>
            <p class="brand-sub">SOFTWARE ECOSYSTEM</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            
            <a href="tel:+994709060986" class="action-btn">
                <i class="fa-solid fa-phone text-blue-600 text-xl"></i>
                <span class="text-[9px] font-bold uppercase opacity-50">Zəng et</span>
            </a>

            <a href="https://wa.me/994709060986" class="action-btn">
                <i class="fa-brands fa-whatsapp text-green-500 text-xl"></i>
                <span class="text-[9px] font-bold uppercase opacity-50">WhatsApp</span>
            </a>

            <a href="https://instagram.com/_zeosk_" class="action-btn btn-full">
                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Instagram</span>
            </a>

            <a href="mailto:zeosksoftwareecosystem@gmail.com" class="action-btn btn-full btn-primary">
                <i class="fa-solid fa-envelope text-lg"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Email Göndər</span>
            </a>

        </div>

        <p class="footer-text">DIGITAL BUSINESS CARD</p>
    </div>

</body>
</html>
