<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOSK | Premium Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,900;1,900&display=swap');

        body {
            background: #fdfdfd;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid #ffffff;
            border-radius: 50px;
            width: 92%;
            max-width: 380px;
            padding: 60px 30px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* PREMIUM TİPOQRAFİYA */
        .brand-container {
            margin-bottom: 50px;
            perspective: 1000px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -4px; /* Hərfləri bir-birinə keçiririk - premium look */
            line-height: 0.8;
            background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .brand-sub {
            font-size: 8.5px;
            font-weight: 700;
            letter-spacing: 7px; /* Çox geniş ara məsafəsi - Apple style */
            color: #94a3b8;
            text-transform: uppercase;
            padding-left: 7px;
        }

        /* DÜYMƏLƏR */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .glass-btn {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 25px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .glass-btn:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border-color: #0071e3;
        }

        .btn-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            background: #000000; /* Qara düymə çox havalı durur */
            color: #fff;
            border: none;
        }

        .btn-full i { color: #fff !important; }

        .footer-tag {
            margin-top: 60px;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 5px;
            color: #cbd5e1;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="premium-card animate__animated animate__zoomIn">
        
        <div class="brand-container">
            <h1 class="brand-name">ZEOSK</h1>
            <p class="brand-sub">SOFTWARE ECOSYSTEM</p>
        </div>

        <div class="grid-layout">
            
            <a href="tel:+994709060986" class="glass-btn">
                <i class="fa-solid fa-phone text-blue-600 text-2xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest opacity-40">Call</span>
            </a>

            <a href="https://wa.me/994709060986" class="glass-btn">
                <i class="fa-brands fa-whatsapp text-emerald-500 text-2xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest opacity-40">WhatsApp</span>
            </a>

            <a href="https://instagram.com/_zeosk_" class="glass-btn btn-full py-5">
                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-[0.3em]">Instagram</span>
            </a>

            <a href="mailto:zeosksoftwareecosystem@gmail.com" class="glass-btn btn-full bg-slate-900 text-white">
                <i class="fa-solid fa-envelope text-lg"></i>
                <span class="text-[10px] font-bold uppercase tracking-[0.3em]">Send Email</span>
            </a>

        </div>

        <div class="footer-tag">DIGITAL BUSINESS CARD</div>
    </div>

</body>
</html>
