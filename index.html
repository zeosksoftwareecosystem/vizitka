<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOSK Ecosystem | Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: #020617;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0ea5e9 0%, #6366f1 100%);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 20%); }
        }
        /* Ağ düzbucaqlını təmizləmək üçün filtr */
        .logo-cleaner {
            mix-blend-mode: lighten;
            filter: contrast(110%) brightness(110%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">

    <div class="blob"></div>

    <div class="glass-card max-w-[380px] w-full rounded-[3.5rem] p-10 text-center animate__animated animate__zoomIn">
        
        <div class="mb-10 logo-cleaner animate__animated animate__fadeInDown animate__delay-1s">
            <div class="relative inline-block w-full">
                <img src="logo.png" alt="ZEOSK" class="w-full h-auto object-contain mx-auto">
            </div>
        </div>

        <div class="space-y-4">
            
            <div class="grid grid-cols-2 gap-4">
                <a href="tel:+994709060986" class="btn-glass py-5 rounded-3xl flex flex-col items-center gap-3">
                    <i class="fa-solid fa-phone text-cyan-400 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-70">Zəng et</span>
                </a>
                <a href="https://wa.me/994709060986" class="btn-glass py-5 rounded-3xl flex flex-col items-center gap-3">
                    <i class="fa-brands fa-whatsapp text-emerald-400 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-70">WhatsApp</span>
                </a>
            </div>

            <a href="https://instagram.com/_zeosk_" class="btn-glass w-full py-5 rounded-3xl flex items-center justify-center gap-4">
                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                <span class="text-[11px] font-bold uppercase tracking-[0.2em] opacity-70">Instagram</span>
            </a>

            <a href="mailto:zeosksoftwareecosystem@gmail.com" class="btn-glass w-full py-5 rounded-3xl flex items-center justify-center gap-4">
                <i class="fa-solid fa-envelope text-rose-400 text-xl"></i>
                <span class="text-[11px] font-bold uppercase tracking-[0.2em] opacity-70">Email Göndər</span>
            </a>

        </div>

        <div class="mt-12 opacity-10">
            <p class="text-[8px] font-mono tracking-[0.5em]">ZEOSK INTEGRATED SYSTEMS</p>
        </div>
    </div>

</body>
</html>
