<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOSK | Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            /* Fonu çox açıq boz edirik ki, ağ loqo ilə boğulmasın, amma loqo fonu da itkin düşsün */
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border-radius: 50px;
            width: 100%;
            max-width: 380px;
            padding: 40px 24px;
            text-align: center;
            position: relative;
        }
        .btn-action {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #1e293b;
        }
        .btn-action:hover {
            background: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #3b82f6;
        }
        .btn-email {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            background: #0071e3;
            color: white;
            border: none;
        }
        .btn-email:hover {
            background: #0062c4;
            color: white;
        }
        .logo-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto;
            display: block;
            /* Loqonu ağ fonla birləşdirir */
            mix-blend-mode: multiply; 
        }
        /* Arxa fonda hərəkət edən dekorativ dairələr */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            z-index: -1;
            animation: float 10s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 2s;"></div>

    <div class="glass-card animate__animated animate__zoomIn">
        
        <div class="mb-8 animate__animated animate__fadeInDown animate__delay-1s">
            <img src="logo.png" alt="ZEOSK" class="logo-img">
            <div class="mt-4">
                <h2 class="text-[10px] font-black tracking-[0.4em] text-slate-400 uppercase">Software Ecosystem</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="tel:+994709060986" class="btn-action">
                <i class="fa-solid fa-phone text-blue-500 text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Zəng et</span>
            </a>
            <a href="https://wa.me/994709060986" class="btn-action">
                <i class="fa-brands fa-whatsapp text-green-500 text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">WhatsApp</span>
            </a>
            
            <a href="https://instagram.com/_zeosk_" class="btn-action w-full col-span-2 flex-row justify-center gap-4">
                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Instagram</span>
            </a>

            <a href="mailto:zeosksoftwareecosystem@gmail.com" class="btn-action btn-email w-full py-5">
                <i class="fa-solid fa-paper-plane text-white text-lg"></i>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Email Göndər</span>
            </a>
        </div>

        <div class="mt-12 opacity-30">
            <p style="font-size: 8px; font-weight: 800; letter-spacing: 2px;">ZEOSK INTEGRATED SYSTEMS</p>
        </div>
    </div>

</body>
</html>
